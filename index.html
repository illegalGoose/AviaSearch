<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AviaSearch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="searchResults">
        <div class="results">
            <div class="route">
                <div class="companyAndPrice">
                    <t>Name of the company and price</t>
                </div>
                <div class="firstRoute">
                    <div class="route">
                        <t>Route</t>
                    </div>
                    <div class="travelTime">
                        <t>Time</t>
                    </div>
                    <div class="companyName">
                        <t>Рейс выполняет: КОМПАНИЯ</t>
                    </div>
                </div>
                <hr>
                <div class="secondRoute">
                    <div class="returnRoute">
                        <t>Route</t>
                    </div>
                    <div class="returnTravelTime">
                        <t>Return Time</t>
                    </div>
                    <div class="companyName">
                        <t>Рейс выполняет: КОМПАНИЯ</t>
                    </div>
                </div>
                <input type="button" value="ВЫБРАТЬ" class="submit">
            </div>
            <div class="more">
                <input style="width: 300px; height: 30px; font-size: 20px;" type="button" value="Показать еще">
            </div>
        </div>
        <div class="sorting">
            <h4>Сортировать</h4>
            <p><input type="radio" name="sort">- по возрастанию цены</p>
            <p><input type="radio" name="sort">- по убыванию цены</p>
            <p><input type="radio" name="sort">- по времени в пути</p>
        </div>
        <div class="filtering">
            <h4>Фильтровать</h4>
            <p><input type="checkbox" name="transfer">- 1 пересадка</p>
            <p><input type="checkbox" name="transfer">- без пересадок</p>
            <div class="price">
                <h4>Цена</h4>
                <p style="margin-bottom: 15px;">От <input type="text" value=""></p>
                <p>До <input type="text" value=""></p>
            </div>
            <div class="companies">
                <h4>Авиакомпании</h4>
                <p><input type="checkbox" name="transfer">- 1 ИМЯ КОМПАНИИ</p>
                <p><input type="checkbox" name="transfer">- 1 ИМЯ КОМПАНИИ</p>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
